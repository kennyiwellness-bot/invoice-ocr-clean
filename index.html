<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iWellness Invoice OCR</title>

<script src="pdfjs/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "pdfjs/pdf.worker.min.js";
</script>

<style>
body{font-family:Arial;margin:30px;background:#f7f7f7}
.container{display:flex;gap:20px}
.panel{background:white;padding:20px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
button{padding:10px 15px;border:none;border-radius:6px;background:#ff7a00;color:white;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px}
td,th{border:1px solid #ddd;padding:8px}
</style>

</head>

<body>

<h2>iWellness Invoice OCR</h2>

<div class="container">

<div class="panel">

<label>Invoice Type</label>

<select id="mode">
<option value="petty">Petty Cash</option>
<option value="purchasing">Purchasing</option>
</select>

<br><br>

<input type="file" id="fileInput">

<br><br>

<button onclick="runOCR()">Start OCR</button>

</div>


<div class="panel">

<h3>OCR Result</h3>

<table id="resultTable">

<thead>
<tr>
<th>Account Code</th>
<th>Account Type</th>
<th>Invoice Date</th>
<th>Invoice No</th>
<th>Company</th>
<th>Item</th>
<th>Total</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let accountCatalog = {}

async function loadAccountCatalog(){

const res = await fetch("account_codes.json")
accountCatalog = await res.json()

}

function mapAccount(item){

item = item.toLowerCase()

for(const key in accountCatalog){

if(item.includes(key)){
return accountCatalog[key]
}

}

return {code:"",type:""}

}

async function runOCR(){

const file = document.getElementById("fileInput").files[0]

if(!file) return

const form = new FormData()

form.append("file",file)

const res = await fetch("/api/ocr",{method:"POST",body:form})

const data = await res.json()

renderRows(data.rows)

}

function renderRows(rows){

const tbody = document.querySelector("#resultTable tbody")

tbody.innerHTML=""

rows.forEach(r=>{

const acc = mapAccount(r.item||"")

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${acc.code}</td>
<td>${acc.type}</td>
<td>${r.invoice_date||""}</td>
<td>${r.invoice_no||""}</td>
<td>${r.company_name||""}</td>
<td>${r.item||""}</td>
<td>${r.total_amount||""}</td>
`

tbody.appendChild(tr)

})

}

loadAccountCatalog()

</script>

</body>
</html>
